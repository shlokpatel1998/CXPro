name: AI Evaluation

on:
  pull_request:
    paths:
      - 'backend/ai_service/**'
      - 'backend/prompts/**'
      - 'backend/ai_service/eval/fixtures/**'
      - '.github/workflows/ai-eval.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/ai_service/**'
      - 'backend/prompts/**'
      - 'backend/ai_service/eval/fixtures/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  ai-eval:
    name: Run AI Quality Evaluation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git commit info
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Set up environment
        run: |
          echo "Setting up test environment variables"
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_NAME=cx_test" >> $GITHUB_ENV
          echo "DB_USER=postgres" >> $GITHUB_ENV
          echo "DB_PASSWORD=postgres" >> $GITHUB_ENV
      
      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
          sudo -u postgres psql -c "CREATE DATABASE cx_test OWNER postgres;" || echo "cx_test already exists"
          sudo -u postgres psql -c "ALTER USER postgres CREATEDB;"
      
      - name: Apply database migrations
        run: |
          cd backend
          python apply_eval_migration.py || echo "Migration may already exist"
      
      - name: Load baseline metrics
        id: baseline
        run: |
          cd backend/ai_service/eval
          if [ -f "baseline.json" ]; then
            echo "Loading existing baseline..."
            BASELINE_PASS_RATE=$(jq -r '.pass_rate' baseline.json)
            BASELINE_CITATION_RECALL=$(jq -r '.avg_citation_recall' baseline.json)
            echo "baseline_pass_rate=$BASELINE_PASS_RATE" >> $GITHUB_OUTPUT
            echo "baseline_citation_recall=$BASELINE_CITATION_RECALL" >> $GITHUB_OUTPUT
          else
            echo "No baseline found, using defaults..."
            echo "baseline_pass_rate=0.7" >> $GITHUB_OUTPUT
            echo "baseline_citation_recall=0.6" >> $GITHUB_OUTPUT
          fi
      
      - name: Run AI evaluation tests
        id: eval
        run: |
          cd backend/ai_service/eval
          
          # Run the evaluation
          python -m pytest test_cx_execution.py -v --tb=short --color=yes | tee eval_output.txt
          
          # Capture exit code
          EVAL_EXIT_CODE=${PIPESTATUS[0]}
          
          # Extract metrics from output
          PASS_RATE=$(grep "Pass Rate:" eval_output.txt | tail -1 | sed 's/.*Pass Rate: \([0-9.]*\)%.*/\1/' | awk '{print $1/100}')
          CITATION_RECALL=$(grep "Avg Citation Recall:" eval_output.txt | tail -1 | sed 's/.*Avg Citation Recall: \([0-9.]*\).*/\1/')
          
          echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "citation_recall=$CITATION_RECALL" >> $GITHUB_OUTPUT
          echo "exit_code=$EVAL_EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Display summary
          echo "::notice title=AI Evaluation Results::Pass Rate: ${PASS_RATE}, Citation Recall: ${CITATION_RECALL}"
          
          exit $EVAL_EXIT_CODE
      
      - name: Check for regression
        if: github.event_name == 'pull_request'
        run: |
          BASELINE_PASS=${{ steps.baseline.outputs.baseline_pass_rate }}
          BASELINE_CITATION=${{ steps.baseline.outputs.baseline_citation_recall }}
          CURRENT_PASS=${{ steps.eval.outputs.pass_rate }}
          CURRENT_CITATION=${{ steps.eval.outputs.citation_recall }}
          
          # Check for >10% regression
          python3 -c "
          import sys
          baseline_pass = float('$BASELINE_PASS')
          baseline_citation = float('$BASELINE_CITATION')
          current_pass = float('$CURRENT_PASS' or 0)
          current_citation = float('$CURRENT_CITATION' or 0)
          
          pass_drop = baseline_pass - current_pass
          citation_drop = baseline_citation - current_citation
          
          if pass_drop > 0.1:
              print(f'❌ Pass rate regression detected: {pass_drop*100:.1f}% drop')
              sys.exit(1)
          elif citation_drop > 0.1:
              print(f'❌ Citation recall regression detected: {citation_drop*100:.1f}% drop')
              sys.exit(1)
          else:
              print('✅ No significant regression detected')
          "
      
      - name: Update baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.eval.outputs.exit_code == '0'
        run: |
          cd backend/ai_service/eval
          
          # The test already creates baseline.json
          if [ -f "baseline.json" ]; then
            echo "Baseline updated for main branch"
            
            # Optionally commit the baseline back to the repo
            if [ "${{ github.actor }}" != "dependabot[bot]" ]; then
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              git add baseline.json
              git diff --staged --quiet || (git commit -m "chore: Update AI evaluation baseline" && git push)
            fi
          fi
      
      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passRate = '${{ steps.eval.outputs.pass_rate }}';
            const citationRecall = '${{ steps.eval.outputs.citation_recall }}';
            const exitCode = '${{ steps.eval.outputs.exit_code }}';
            
            const baselinePass = '${{ steps.baseline.outputs.baseline_pass_rate }}';
            const baselineCitation = '${{ steps.baseline.outputs.baseline_citation_recall }}';
            
            const passDiff = ((parseFloat(passRate) - parseFloat(baselinePass)) * 100).toFixed(1);
            const citationDiff = ((parseFloat(citationRecall) - parseFloat(baselineCitation)) * 100).toFixed(1);
            
            const status = exitCode === '0' ? '✅ Passed' : '❌ Failed';
            const passTrend = passDiff >= 0 ? `📈 +${passDiff}%` : `📉 ${passDiff}%`;
            const citationTrend = citationDiff >= 0 ? `📈 +${citationDiff}%` : `📉 ${citationDiff}%`;
            
            const comment = `## AI Evaluation Results
            
            **Status:** ${status}
            
            | Metric | Current | Baseline | Change |
            |--------|---------|----------|--------|
            | Pass Rate | ${(parseFloat(passRate) * 100).toFixed(1)}% | ${(parseFloat(baselinePass) * 100).toFixed(1)}% | ${passTrend} |
            | Citation Recall | ${(parseFloat(citationRecall) * 100).toFixed(1)}% | ${(parseFloat(baselineCitation) * 100).toFixed(1)}% | ${citationTrend} |
            
            ${exitCode !== '0' ? '⚠️ **This PR introduces AI quality regressions that must be addressed.**' : ''}
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-results
          path: |
            backend/ai_service/eval/eval_output.txt
            backend/ai_service/eval/baseline.json
          retention-days: 30